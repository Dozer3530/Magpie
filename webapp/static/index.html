<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magpie — Weekly Package Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0B0B0B; --bg-2:#0F0F0F; --panel:#161616; --panel-2:#1E1E1E;
    --ink:#F4F1E8;          /* bone type / borders   */
    --ink-soft:#B4B0A4;
    --ink-faint:#76736A;
    --lime:#C6F000;         /* acid lime accent      */
    --lime-deep:#C6F000;
    --red:#FF3B22; --clay:#FF3B22; --clay-soft:#FF7A6A;
    --blue:#3D6BFF; --gold:#3D6BFF;
    --line:#F4F1E8;         /* bone hairline/border   */
    --line-2:rgba(244,241,232,.18);
    --bd:3px;
    --rail:280px;
  }

  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:"Archivo",system-ui,sans-serif;
    line-height:1.45;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
    background-image:linear-gradient(rgba(244,241,232,.025) 1px,transparent 1px),
      linear-gradient(90deg,rgba(244,241,232,.025) 1px,transparent 1px);
    background-size:40px 40px;
  }
  ::selection{background:var(--lime);color:#0B0B0B}

  /* ============ APP SHELL ============ */
  .app{display:grid;grid-template-columns:var(--rail) 1fr;min-height:100vh}

  /* ---- left rail ---- */
  .rail{position:sticky;top:0;height:100vh;border-right:var(--bd) solid var(--line);
    background:#000;color:var(--ink);display:flex;flex-direction:column;
    padding:0;overflow-y:auto}
  .rail .brand{padding:26px 24px;border-bottom:var(--bd) solid var(--lime);background:#000}
  .rail .wordmark{font-family:"Archivo",sans-serif;font-weight:900;font-size:46px;
    line-height:.82;letter-spacing:-.05em;text-transform:uppercase}
  .rail .wordmark .bird{color:var(--lime)}
  .rail .tag{font-family:"Space Mono",monospace;font-size:10px;letter-spacing:.18em;
    text-transform:uppercase;color:var(--lime);margin-top:12px}

  nav{padding:0;flex:1}
  .nav-item{display:flex;align-items:center;gap:12px;padding:16px 22px;
    cursor:pointer;color:var(--ink);transition:.12s;position:relative;
    border-bottom:1px solid rgba(244,241,232,.12);text-transform:uppercase}
  .nav-item:hover{background:rgba(198,240,0,.1)}
  .nav-item.active{background:var(--lime);color:#000}
  .nav-item .ni{font-family:"Space Mono",monospace;font-size:12px;font-weight:700;
    width:24px;color:var(--lime);letter-spacing:.04em}
  .nav-item.active .ni{color:#000}
  .nav-item .nl{font-weight:800;font-size:14px;flex:1;letter-spacing:-.01em}
  .nav-item .nd{font-family:"Space Mono",monospace;
    width:9px;height:9px;background:transparent;border:2px solid var(--ink-faint)}
  .nav-item.active .nd{border-color:#000}
  .nav-item .nd.done{background:var(--lime);border-color:var(--line)}
  .nav-item.active .nd.done{background:#000;border-color:#000}

  .rail .foot{padding:18px 24px;border-top:var(--bd) solid var(--lime);
    font-family:"Space Mono",monospace;font-size:11px;color:var(--ink-soft);
    line-height:1.9}
  .rail .foot b{color:var(--lime);font-weight:700}

  /* ---- main column ---- */
  .main{display:flex;flex-direction:column;min-width:0}

  /* context bar */
  .ctxbar{position:sticky;top:0;z-index:50;background:var(--bg);
    border-bottom:var(--bd) solid var(--line);padding:16px 36px;
    display:flex;align-items:center;gap:22px;flex-wrap:wrap}
  .ctxbar .live{font-family:"Space Mono",monospace;font-size:11px;font-weight:700;letter-spacing:.12em;
    text-transform:uppercase;color:var(--ink);display:flex;align-items:center;gap:9px}
  .ctxbar .live .dot{width:10px;height:10px;background:var(--lime);border:2px solid var(--ink)}
  .ctxbar .spacer{flex:1}
  .seg{display:flex;border:var(--bd) solid var(--line)}
  .seg button{font-family:"Space Mono",monospace;font-size:12px;font-weight:700;letter-spacing:.04em;
    text-transform:uppercase;padding:8px 18px;background:var(--bg);color:var(--ink);
    border:none;cursor:pointer;transition:.12s;border-right:2px solid var(--line)}
  .seg button:last-child{border-right:none}
  .seg button.on{background:var(--lime);color:#000}
  .ctxfield{font-family:"Space Mono",monospace;font-size:12px;font-weight:700;text-transform:uppercase;color:var(--ink);
    display:flex;align-items:center;gap:8px}
  .ctxfield b{background:var(--lime);color:#000;font-weight:700;padding:2px 7px;border:2px solid var(--line)}
  .ctxfield select{font-family:"Space Mono",monospace;font-size:12px;font-weight:700;padding:6px 10px;
    border:2px solid var(--line);background:var(--bg);color:var(--ink);cursor:pointer}
  .icon-btn{font-family:"Space Mono",monospace;font-size:11px;font-weight:700;text-transform:uppercase;padding:7px 12px;border:2px solid var(--line);
    background:var(--bg);color:var(--ink);cursor:pointer;transition:.12s}
  .icon-btn:hover{background:var(--lime);border-color:var(--line);color:#000}
  .icon-btn.danger:hover{background:var(--red);border-color:var(--line);color:var(--ink)}

  /* view container */
  .view{padding:36px 36px 80px;max-width:1240px;animation:viewin .45s cubic-bezier(.16,1,.3,1)}
  @keyframes viewin{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
  .rise{opacity:0;transform:translateY(20px);animation:rise .6s cubic-bezier(.16,1,.3,1) forwards}
  @keyframes rise{to{opacity:1;transform:none}}
  .loading{font-family:"Space Mono",monospace;font-size:13px;font-weight:700;text-transform:uppercase;
    letter-spacing:.08em;color:var(--ink-soft);padding:60px 0;text-align:center}

  /* view header */
  .vhead{margin-bottom:30px}
  .vhead .step{display:inline-block;font-family:"Space Mono",monospace;font-size:11px;font-weight:700;letter-spacing:.14em;
    text-transform:uppercase;color:var(--ink);background:var(--red);padding:5px 11px;margin-bottom:16px;border:2px solid var(--line)}
  .vhead h1{font-family:"Archivo",sans-serif;font-weight:900;font-size:clamp(40px,7vw,80px);
    line-height:.86;letter-spacing:-.045em;text-transform:uppercase}
  .vhead p{margin-top:16px;max-width:62ch;color:var(--ink-soft);font-size:15px;font-weight:500}
  .vhead b{background:var(--lime);color:#000;padding:1px 5px;font-weight:700}

  .section-title{display:flex;align-items:center;gap:14px;margin:42px 0 20px}
  .section-title h2{font-family:"Archivo",sans-serif;font-weight:900;font-size:22px;text-transform:uppercase;
    letter-spacing:-.02em;background:var(--lime);color:#000;padding:6px 14px}
  .section-title .idx{font-family:"Space Mono",monospace;font-size:12px;font-weight:700;color:var(--lime);letter-spacing:.04em}
  .section-title .rule{flex:1;height:var(--bd);background:var(--line)}

  /* ============ WEEK OVERVIEW ============ */
  .vitals{display:grid;grid-template-columns:repeat(4,1fr);border:var(--bd) solid var(--line);margin-bottom:22px}
  .vital{padding:22px;border-right:var(--bd) solid var(--line);background:var(--panel)}
  .vital:last-child{border-right:none}
  .vital .label{font-family:"Space Mono",monospace;font-size:10px;font-weight:700;letter-spacing:.1em;
    text-transform:uppercase;color:var(--ink-soft)}
  .vital .num{font-family:"Archivo",sans-serif;font-size:clamp(30px,4vw,46px);font-weight:900;
    line-height:.95;margin-top:10px;letter-spacing:-.03em;color:var(--lime)}
  .vital .num .u{font-family:"Space Mono",monospace;font-size:14px;color:var(--ink-faint);
    font-weight:700;margin-left:4px}
  .vital .sub{font-size:12px;color:var(--ink-soft);margin-top:7px;font-weight:600}
  .vital.alert{background:var(--lime)}
  .vital.alert .label,.vital.alert .num,.vital.alert .num .u,.vital.alert .sub{color:#000}

  /* coverage meter */
  .cover{display:grid;grid-template-columns:1fr 1fr;border:var(--bd) solid var(--line);border-top:none;margin-bottom:22px}
  .meter{border-right:var(--bd) solid var(--line);background:var(--panel);padding:18px 20px}
  .meter:last-child{border-right:none}
  .meter .mt{display:flex;justify-content:space-between;align-items:baseline;
    font-family:"Space Mono",monospace;font-size:11px;font-weight:700;letter-spacing:.05em;
    text-transform:uppercase;color:var(--ink)}
  .meter .mt b{font-family:"Archivo",sans-serif;font-size:22px;color:var(--lime);font-weight:900;letter-spacing:-.02em}
  .track{height:16px;background:#000;border:2px solid var(--line);margin-top:12px;position:relative;overflow:hidden}
  .track i{position:absolute;inset:0 100% 0 0;border-right:2px solid var(--line);animation:grow 1.1s cubic-bezier(.16,1,.3,1) forwards}
  .track i.survey{background:var(--lime)}
  .track i.lab{background:var(--blue)}
  .track i.pest{background:#F2A900}
  @keyframes grow{to{right:var(--r)}}

  .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
  .pt{background:var(--panel);border:var(--bd) solid var(--line);padding:18px;position:relative;
    transition:transform .12s,box-shadow .12s;cursor:pointer;box-shadow:6px 6px 0 var(--lime)}
  .pt:hover{transform:translate(-2px,-2px);box-shadow:9px 9px 0 var(--lime)}
  .pt:has(.status.flag){box-shadow:6px 6px 0 var(--red)}
  .pt:has(.status.flag):hover{box-shadow:9px 9px 0 var(--red)}
  .pt:has(.status.watch){box-shadow:6px 6px 0 var(--blue)}
  .pt:has(.status.watch):hover{box-shadow:9px 9px 0 var(--blue)}
  .pt:has(.status.empty){box-shadow:6px 6px 0 var(--ink-faint)}
  .pt:has(.status.empty):hover{box-shadow:9px 9px 0 var(--ink-faint)}
  .pt .id{font-family:"Archivo",sans-serif;font-size:34px;font-weight:900;line-height:1;letter-spacing:-.03em}
  .pt .stage{font-family:"Space Mono",monospace;font-size:11px;font-weight:700;color:var(--ink-soft);margin-top:5px;text-transform:uppercase}
  .pt .row{display:flex;justify-content:space-between;font-family:"Space Mono",monospace;font-weight:700;
    font-size:12.5px;margin-top:14px;padding-top:12px;border-top:2px solid rgba(244,241,232,.18)}
  .pt .row span:last-child{color:var(--ink-soft)}
  .pt .coverbar{height:8px;background:#000;border:2px solid var(--line);margin-top:14px;position:relative;overflow:hidden}
  .pt .coverbar i{position:absolute;inset:0;background:var(--lime)}
  .status{position:absolute;top:18px;right:18px;width:16px;height:16px;border:2px solid var(--line)}
  .status.ok{background:var(--lime)}
  .status.watch{background:var(--blue)}
  .status.flag{background:var(--red)}
  .status.empty{background:#000}

  /* ============ WEEKS DASHBOARD ============ */
  .weeks-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
  .wkcard{cursor:default}
  .wkcard.wk-active .wk-id{color:var(--lime)}
  .wk-head{display:flex;align-items:flex-start;gap:12px;margin-bottom:6px}
  .wk-id{font-family:"Archivo",sans-serif;font-weight:900;font-size:26px;letter-spacing:-.03em;
    line-height:1;text-transform:uppercase;word-break:break-word}
  .wk-meta{font-family:"Space Mono",monospace;font-size:10px;font-weight:700;color:var(--ink-faint);
    text-transform:uppercase;margin-top:6px;letter-spacing:.04em}
  .wk-actions{margin-left:auto;display:flex;gap:6px;flex-shrink:0;align-items:flex-start}
  .mini{font-family:"Space Mono",monospace;font-size:10px;font-weight:700;text-transform:uppercase;
    letter-spacing:.04em;padding:5px 9px;border:2px solid var(--line);background:var(--bg);color:var(--ink);cursor:pointer;transition:.12s}
  .mini:hover{background:var(--lime);color:#000}
  .mini.danger:hover{background:var(--red);color:var(--ink)}
  .wk-actions .rn-in{font-family:"Space Mono",monospace;font-size:12px;font-weight:700;padding:4px 8px;
    border:2px solid var(--line);background:var(--bg);color:var(--ink);width:130px}
  .wk-crop{margin-top:14px;padding-top:14px;border-top:2px solid var(--line-2)}
  .wk-crop-name{font-family:"Space Mono",monospace;font-size:11px;font-weight:700;text-transform:uppercase;color:var(--ink-soft);margin-bottom:9px}
  .wk-bars{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  .wk-bar .lab-mt{display:flex;justify-content:space-between;font-family:"Space Mono",monospace;font-size:10px;
    font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-soft);margin-bottom:6px}
  .wk-bar .lab-mt b{color:var(--ink)}

  /* ============ TRENDS ============ */
  .trend-controls{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap}
  .trend-controls label{font-family:"Space Mono",monospace;font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-soft)}
  .trend-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:16px;margin-bottom:24px}
  .trend-card{border:var(--bd) solid var(--line);background:var(--panel);padding:16px 18px}
  .trend-card .th{display:flex;align-items:baseline;gap:10px;margin-bottom:8px}
  .trend-card .th h3{font-family:"Archivo",sans-serif;font-weight:900;font-size:15px;text-transform:uppercase;letter-spacing:-.01em}
  .trend-card .th .last{margin-left:auto;font-family:"Archivo",sans-serif;font-weight:900;font-size:22px;letter-spacing:-.02em}
  .trend-card .th .last .u{font-family:"Space Mono",monospace;font-size:10px;font-weight:700;color:var(--ink-faint);margin-left:3px}
  .trend-card .th .last .d{font-family:"Space Mono",monospace;font-size:12px;font-weight:700;margin-left:8px}
  .trend-card svg{width:100%;height:150px;display:block}
  .trend-empty{font-family:"Space Mono",monospace;font-size:12px;font-weight:700;color:var(--ink-faint);padding:34px 0;text-align:center}
  .d-up{color:var(--lime)} .d-dn{color:var(--blue)} .d-flat{color:var(--ink-faint)}

  /* ============ IMPORT VIEWS ============ */
  .dropzone{border:var(--bd) dashed var(--line);background:var(--panel);
    padding:46px 32px;text-align:center;transition:.12s;cursor:pointer;position:relative;overflow:hidden}
  .dropzone:hover,.dropzone.hot{border-style:solid;background:var(--panel-2)}
  .dropzone .icon{width:54px;height:54px;margin:0 auto 18px;border:var(--bd) solid var(--lime);
    display:flex;align-items:center;justify-content:center;
    font-family:"Archivo",sans-serif;font-weight:900;font-size:28px;color:var(--lime)}
  .dropzone h3{font-family:"Archivo",sans-serif;font-weight:900;font-size:22px;text-transform:uppercase;letter-spacing:-.02em}
  .dropzone .hint{font-family:"Space Mono",monospace;font-size:12px;font-weight:700;color:var(--ink-soft);margin-top:8px;letter-spacing:.04em;text-transform:uppercase}
  .filechip{display:inline-flex;align-items:center;gap:10px;margin-top:22px;
    background:var(--lime);color:#000;font-family:"Space Mono",monospace;font-size:12px;font-weight:700;
    padding:9px 16px;border:2px solid var(--line);letter-spacing:.04em}
  .filechip .x{color:#000}

  .panel{border:var(--bd) solid var(--line);background:var(--panel);margin-top:26px}
  .panel .ph{display:flex;align-items:center;gap:14px;padding:16px 22px;border-bottom:var(--bd) solid var(--line);
    font-family:"Space Mono",monospace;font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink)}
  .panel .ph .badge{margin-left:auto;background:var(--lime);color:#000;padding:3px 10px;border:2px solid var(--line);
    font-weight:700;letter-spacing:.04em}
  .panel .pbody{padding:8px 22px 22px;overflow-x:auto}

  table.data{width:100%;border-collapse:collapse;font-family:"Space Mono",monospace;font-size:13px}
  table.data th{text-align:left;font-size:10px;letter-spacing:.12em;text-transform:uppercase;
    color:var(--ink-soft);font-weight:700;padding:14px 12px 10px;border-bottom:2px solid var(--line)}
  table.data td{padding:11px 12px;border-bottom:1px solid var(--line-2)}
  table.data tr:last-child td{border-bottom:none}
  table.data tr:hover td{background:var(--panel-2)}
  .map-arrow{color:var(--lime)}
  .tag-auto{font-size:10px;font-weight:700;padding:2px 7px;background:var(--lime);color:#000;letter-spacing:.06em;text-transform:uppercase}
  .tag-skip{font-size:10px;font-weight:700;padding:2px 7px;background:transparent;border:2px solid var(--ink-faint);color:var(--ink-faint);letter-spacing:.06em;text-transform:uppercase}

  select,input.cell{font-family:"Space Mono",monospace;font-size:12.5px;padding:6px 10px;
    border:2px solid var(--line);background:var(--bg);color:var(--ink);cursor:pointer}
  select:focus,input.cell:focus{outline:none;border-color:var(--lime)}

  .photos{display:flex;gap:10px;flex-wrap:wrap;margin-top:6px}
  .photo{width:74px;height:74px;border:2px solid var(--line);
    display:flex;align-items:center;justify-content:center;font-family:"Space Mono",monospace;
    font-size:10px;font-weight:700;color:var(--ink);position:relative;overflow:hidden;background:#000}
  .photo img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .photo span{position:relative;z-index:2;background:rgba(11,11,11,.7);padding:2px 5px}
  .photo.add{border-style:dashed;background:var(--panel);color:var(--lime);cursor:pointer}
  .photo.add span{background:none;color:var(--lime);font-size:22px}

  .btn{font-family:"Space Mono",monospace;font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
    padding:14px 28px;border:var(--bd) solid var(--line);background:var(--lime);color:#000;
    cursor:pointer;transition:.12s;display:inline-flex;align-items:center;gap:12px}
  .btn:hover{transform:translate(-2px,-2px);box-shadow:5px 5px 0 var(--line)}
  .btn.ghost{background:transparent;color:var(--ink)}
  .btn.ghost:hover{background:var(--ink);color:#000;box-shadow:5px 5px 0 var(--lime)}
  .btn:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}
  .actions{margin-top:26px;display:flex;gap:14px;align-items:center;flex-wrap:wrap}
  .actions .note{font-family:"Space Mono",monospace;font-size:12px;font-weight:700;color:var(--ink-soft)}

  /* ============ OBSERVATIONS ============ */
  .obswrap{display:grid;grid-template-columns:150px 1fr;border:var(--bd) solid var(--line);background:var(--panel)}
  .ptrail{border-right:var(--bd) solid var(--line);padding:14px}
  .ptrail button{display:flex;justify-content:space-between;align-items:center;width:100%;
    font-family:"Space Mono",monospace;font-size:14px;font-weight:700;padding:11px 14px;background:transparent;
    border:none;cursor:pointer;color:var(--ink-soft);margin-bottom:4px;transition:.12s}
  .ptrail button:hover{background:var(--panel-2);color:var(--ink)}
  .ptrail button.on{background:var(--lime);color:#000}
  .ptrail button .pd{width:9px;height:9px;border:2px solid var(--line)}
  .ptrail button.on .pd{border-color:#000}
  .pd.ok{background:var(--lime)}.pd.watch{background:var(--blue)}.pd.flag{background:var(--red)}.pd.empty{background:transparent}
  .obsbody{padding:26px 30px}
  .subtabs{display:flex;gap:0;margin-bottom:24px;border-bottom:var(--bd) solid var(--line)}
  .subtabs button{font-family:"Space Mono",monospace;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
    padding:11px 18px;background:transparent;border:none;border-bottom:var(--bd) solid transparent;color:var(--ink-soft);cursor:pointer;margin-bottom:-3px}
  .subtabs button.on{color:var(--lime);border-bottom-color:var(--lime)}

  .fgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:18px 32px}
  .field{display:flex;flex-direction:column;gap:7px}
  .field label{font-family:"Space Mono",monospace;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft)}
  .field .ctrl{font-family:"Space Mono",monospace;font-size:14px;border:2px solid var(--line);
    background:var(--bg);padding:9px 12px;color:var(--ink);width:100%}
  .field .ctrl:focus{outline:none;border-color:var(--lime)}
  .grp{margin-bottom:30px}
  .grp h4{font-family:"Space Mono",monospace;font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;
    color:#000;background:var(--lime);display:inline-block;padding:5px 11px;margin-bottom:16px}

  .tdrtable{width:100%;border-collapse:collapse;font-family:"Space Mono",monospace;font-size:13px}
  .tdrtable th{text-align:right;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft);
    font-weight:700;padding:8px 10px}
  .tdrtable th:first-child{text-align:left}
  .tdrtable td{padding:6px 10px;text-align:right;border-top:1px solid var(--line-2)}
  .tdrtable td:first-child{text-align:left;color:var(--ink-soft)}
  .tdrtable input{width:90px;text-align:right;font-family:"Space Mono",monospace;font-size:13px;
    border:2px solid var(--line);background:var(--bg);padding:5px 8px;color:var(--ink)}

  .dz-row{display:grid;grid-template-columns:1.4fr .8fr 1fr;gap:14px;align-items:center;
    padding:10px 0;border-bottom:1px solid var(--line-2);font-family:"Space Mono",monospace;font-size:13px}
  .dz-row:last-child{border-bottom:none}
  .dz-row select{width:100%}

  /* lab nutrient grid */
  .nutgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
  .nutcell{border:2px solid var(--line);background:var(--bg);padding:12px 14px}
  .nutcell .el{font-family:"Archivo",sans-serif;font-size:16px;font-weight:900;display:flex;justify-content:space-between;align-items:center;gap:8px;text-transform:uppercase}
  .nutcell .el .u{font-family:"Space Mono",monospace;font-size:10px;color:var(--ink-faint);font-weight:700}
  .nutcell input{width:100%;margin-top:8px;font-family:"Space Mono",monospace;font-size:13px;
    border:2px solid var(--line);background:var(--panel);padding:6px 8px;color:var(--ink)}
  .nutcell .rate-in{width:54px;margin-top:0;text-align:center;text-transform:uppercase}

  .ratios{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
  .ratio{border:2px solid var(--line);background:var(--bg);padding:12px 16px;
    display:flex;justify-content:space-between;align-items:center;gap:10px;font-family:"Space Mono",monospace}
  .ratio .rn{font-weight:700;font-size:14px}
  .ratio .rv{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--ink-faint)}
  .ratio input{width:64px;text-align:right;font-family:"Space Mono",monospace;font-size:13px;
    border:2px solid var(--line);background:var(--panel);padding:5px 7px;color:var(--ink)}

  /* ============ EXPORT ============ */
  .expgrid{display:grid;grid-template-columns:1fr 1.1fr;gap:26px;align-items:start}
  .manifest{border:var(--bd) solid var(--line);background:#000;color:var(--ink);padding:30px;box-shadow:6px 6px 0 var(--lime)}
  .manifest h3{font-family:"Archivo",sans-serif;font-size:22px;font-weight:900;text-transform:uppercase;letter-spacing:-.02em;margin-bottom:4px}
  .manifest .zip{font-family:"Space Mono",monospace;font-size:12px;font-weight:700;color:var(--lime);letter-spacing:.04em;margin-bottom:22px}
  .tree{font-family:"Space Mono",monospace;font-size:13px;line-height:2.05}
  .tree .f{color:var(--ink-faint)}
  .tree .n{color:var(--ink)}
  .tree .sz{color:var(--lime);float:right}
  .tree .dir{color:var(--lime)}
  .tree .empty{color:var(--ink-faint)}

  .runner{border:var(--bd) solid var(--line);background:var(--panel);padding:30px}
  .runner h3{font-family:"Space Mono",monospace;font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:22px}
  .stage{display:flex;align-items:center;gap:16px;padding:14px 0;border-bottom:1px solid var(--line-2)}
  .stage:last-child{border-bottom:none}
  .stage .dot{width:26px;height:26px;border:2px solid var(--line);flex-shrink:0;
    display:flex;align-items:center;justify-content:center;font-family:"Space Mono",monospace;font-size:12px;font-weight:700;color:var(--ink-faint);transition:.2s}
  .stage.run .dot{border-color:var(--blue);color:var(--blue);animation:spin 1s linear infinite}
  .stage.done .dot{background:var(--lime);border-color:var(--line);color:#000}
  .stage.fail .dot{background:var(--red);border-color:var(--line);color:var(--ink)}
  @keyframes spin{to{transform:rotate(360deg)}}
  .stage .st{font-family:"Space Mono",monospace;font-size:13.5px;font-weight:700;color:var(--ink-soft);transition:.2s}
  .stage.done .st,.stage.run .st{color:var(--ink)}
  .stage .stsub{font-size:11px;color:var(--ink-faint);display:block;margin-top:2px;letter-spacing:.02em}

  .toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(120px);
    background:var(--lime);color:#000;font-family:"Space Mono",monospace;font-size:13px;font-weight:700;text-transform:uppercase;
    padding:14px 26px;letter-spacing:.04em;z-index:200;transition:transform .3s cubic-bezier(.16,1,.3,1);
    display:flex;align-items:center;gap:12px;border:var(--bd) solid var(--line);box-shadow:6px 6px 0 #000;max-width:80vw}
  .toast.show{transform:translateX(-50%) translateY(0)}
  .toast .tk{color:#000}
  .toast.err{background:var(--red);color:var(--ink)}
  .toast.err .tk{color:var(--ink)}

  @media(max-width:1080px){
    .app{grid-template-columns:1fr}
    .rail{position:static;height:auto;flex-direction:row;align-items:center;border-right:none;border-bottom:var(--bd) solid var(--line);padding:16px 20px;overflow-x:auto}
    .rail .brand{border-bottom:none;border-right:var(--bd) solid var(--lime);padding:0 22px 0 0}
    .rail .wordmark{font-size:30px}.rail .tag{display:none}
    nav{display:flex;padding:0 0 0 16px;gap:4px}.nav-item{margin-bottom:0;white-space:nowrap;border-bottom:none}
    .nav-item .nl{display:none}.rail .foot{display:none}
    .vitals,.nutgrid{grid-template-columns:repeat(2,1fr)}
    .grid3,.cover,.ratios,.expgrid{grid-template-columns:1fr}
    .fgrid{grid-template-columns:1fr}
  }
</style>
</head>
<body>
<div class="app">
  <!-- ============ LEFT RAIL ============ -->
  <aside class="rail">
    <div class="brand">
      <div class="wordmark">Mag<span class="bird">pie</span></div>
      <div class="tag">Weekly Package Builder</div>
    </div>
    <nav id="nav"></nav>
    <div class="foot">
      DB · <b>packages.sqlite</b><br>
      Frontend · <b>web · localhost</b><br>
      Build · <b>v1.1.0</b>
    </div>
  </aside>

  <!-- ============ MAIN ============ -->
  <div class="main">
    <div class="ctxbar">
      <div class="live"><span class="dot"></span>Working set</div>
      <div class="seg" id="cropseg"></div>
      <div class="ctxfield">Week
        <select id="weekSel"></select>
        <button class="icon-btn" id="newWeek" title="Create the current ISO week">+ Week</button>
        <button class="icon-btn danger" id="delWeek" title="Delete this week (obs rows cascade)">Delete</button>
      </div>
      <div class="spacer"></div>
      <div class="ctxfield" id="issued"></div>
    </div>
    <div class="view" id="view"><div class="loading">Loading…</div></div>
  </div>
</div>

<div class="toast" id="toast"><span class="tk">✓</span><span id="toastmsg"></span></div>

<script>
/* ============================================================
   Magpie web frontend — live, API-driven.
   Every view fetches from the FastAPI layer (which delegates to
   app/services/*), so this stays in lockstep with the desktop.
============================================================ */

const NAV = [
  {id:"weeks",    n:"01", l:"Weeks"},
  {id:"overview", n:"02", l:"Week overview"},
  {id:"survey",   n:"03", l:"Survey123 import"},
  {id:"lab",      n:"04", l:"Lab import"},
  {id:"pest",     n:"05", l:"Pest ID import"},
  {id:"obs",      n:"06", l:"Observations"},
  {id:"export",   n:"07", l:"Export"},
  {id:"trends",   n:"08", l:"Trends"},
];

const STATE = {
  crops:[], crop:null, weeks:[], week:null, view:"weeks",
  schemaCache:{}, overview:null, trendLoc:"", trendCat:"soil",
  activePt:null, obsTab:"field", obsValues:{}, obsImages:[],
  survey:null,   // {token, filename, preview}
  lab:null,      // {token, filename, preview, targets:{idx:loc}}
  pest:null,     // {token, filename, crop, crop_display, weeks, weekIndex, committed}
};

// ---------- API ----------
const API = {
  async _json(r){
    if(!r.ok){
      let detail = r.statusText;
      try{ detail = (await r.json()).detail || detail; }catch(e){}
      throw new Error(detail);
    }
    return r.json();
  },
  get(p){ return fetch(p).then(this._json); },
  post(p, body){ return fetch(p,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body||{})}).then(this._json); },
  put(p, body){ return fetch(p,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)}).then(this._json); },
  del(p){ return fetch(p,{method:"DELETE"}).then(this._json); },
  upload(p, form){ return fetch(p,{method:"POST",body:form}).then(this._json); },
};

// ---------- helpers ----------
const $ = s => document.querySelector(s);
const esc = s => String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const cap = s => s ? s[0].toUpperCase()+s.slice(1) : s;
function toast(msg, err){const t=$("#toast");$("#toastmsg").textContent=msg;t.classList.toggle("err",!!err);t.querySelector(".tk").textContent=err?"!":"✓";t.classList.add("show");clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove("show"),3200);}
function statusClass(filled, expected){ if(!filled) return "empty"; if(filled>=expected) return "ok"; return "watch"; }

// ---------- context bar ----------
function renderCtx(){
  $("#cropseg").innerHTML = STATE.crops.map(c=>
    `<button data-crop="${c.code}" class="${c.code===STATE.crop?"on":""}">${esc(c.display_name)}</button>`).join("");
  $("#cropseg").querySelectorAll("button").forEach(b=>b.onclick=()=>{
    if(b.dataset.crop===STATE.crop) return;
    STATE.crop=b.dataset.crop; STATE.activePt=null; STATE.survey=null; STATE.lab=null;
    boot.refreshAndRender();
  });
  const w=$("#weekSel");
  w.innerHTML = STATE.weeks.map(wk=>`<option value="${wk}" ${wk===STATE.week?"selected":""}>${wk}</option>`).join("")
    || `<option>(no weeks)</option>`;
  w.onchange=()=>{ STATE.week=w.value; STATE.activePt=null; boot.refreshAndRender(); };
  $("#newWeek").onclick=async()=>{
    const {current}=await API.get("/api/weeks");
    if(STATE.weeks.includes(current)){ STATE.week=current; toast(`Week ${current} already exists — selected it`); }
    else { await API.post("/api/weeks",{tag:current}); toast(`Created week ${current}`); }
    await boot.loadWeeks(); STATE.week=current; boot.refreshAndRender();
  };
  $("#delWeek").onclick=async()=>{
    if(!STATE.week) return;
    if(!confirm(`Delete week ${STATE.week}? Observation rows for every crop in this week are removed.`)) return;
    await API.del(`/api/weeks/${encodeURIComponent(STATE.week)}`);
    toast(`Deleted week ${STATE.week}`);
    await boot.loadWeeks(); STATE.week=STATE.weeks[0]||null; boot.refreshAndRender();
  };
  $("#issued").innerHTML = `Issued <b>${new Date().toISOString().slice(0,10)}</b> · Olds, AB`;
}

// ---------- nav ----------
function renderNav(){
  $("#nav").innerHTML = NAV.map(it=>{
    const done = (it.id==="survey"&&STATE.survey&&STATE.survey.committed) ||
                 (it.id==="lab"&&STATE.lab&&STATE.lab.committed);
    return `<div class="nav-item ${STATE.view===it.id?"active":""}" data-view="${it.id}">
      <span class="ni">${it.n}</span><span class="nl">${it.l}</span>
      <span class="nd ${done?"done":""}"></span></div>`;
  }).join("");
  $("#nav").querySelectorAll(".nav-item").forEach(el=>el.onclick=()=>{STATE.view=el.dataset.view;render();});
}

// ============================================================
//  VIEW 01 — WEEKS DASHBOARD
// ============================================================
function progressBar(kind, label, locs, total, filled, expected, noun){
  const pct = total ? Math.round(locs/total*100) : 0;
  const cellPct = expected ? Math.round(filled/expected*100) : 0;
  const tip = noun ? `${locs}/${total} ${noun}` : `${filled}/${expected} fields filled (${cellPct}%)`;
  return `<div class="wk-bar" title="${tip}">
    <div class="lab-mt"><span>${label}</span><b>${locs}/${total}</b></div>
    <div class="track"><i class="${kind}" style="--r:${100-pct}%"></i></div></div>`;
}
function weekCard(w){
  const active = w.iso_week===STATE.week;
  const crops = w.crops.map(c=>`
    <div class="wk-crop">
      <div class="wk-crop-name">${esc(c.display_name)}</div>
      <div class="wk-bars">
        ${progressBar("survey","Field", c.field_locations, c.total_locations, c.field_filled, c.field_expected)}
        ${progressBar("lab","Lab", c.lab_locations, c.total_locations, c.lab_filled, c.lab_expected)}
        ${progressBar("pest","Pest", c.pest_cards||0, c.total_locations, 0, 0, "cards completed")}
      </div>
    </div>`).join("");
  return `<article class="pt wkcard rise ${active?"wk-active":""}" data-week="${esc(w.iso_week)}">
    <div class="wk-head">
      <div><div class="wk-id">${esc(w.iso_week)}</div>
        <div class="wk-meta">${active?"● active · ":""}created ${esc((w.created_at||"").slice(0,10))}</div></div>
      <div class="wk-actions">
        <button class="mini" data-act="open">Open</button>
        <button class="mini" data-act="rename">Rename</button>
        <button class="mini danger" data-act="del">Delete</button>
      </div>
    </div>
    ${crops}
  </article>`;
}
async function viewWeeks(){
  const weeks = await API.get("/api/weeks/progress");
  let pubDir = "";
  try{ pubDir = (await API.get("/api/publish/dir")).dir || ""; }catch(e){}
  const cards = weeks.length
    ? `<div class="weeks-grid">${weeks.map(weekCard).join("")}</div>`
    : `<div class="loading">No weeks yet — create one to start.</div>`;
  return `
  <div class="vhead rise"><div class="step">Step 01 · Multi-week</div><h1>Weeks</h1>
    <p>Every week with its <b>Field</b> (Survey123), <b>Lab</b> (PT2R) and <b>Pest</b> (cards completed) completeness side by side, per crop — each bar counts monitoring points. Field obs land first; the Lab and Pest bars fill in as results come back. Rename a week to whatever you call it (the code is also used in export filenames).</p></div>
  <div class="actions rise" style="margin:0 0 8px">
    <button class="btn" id="newWeekDash">+ New week</button>
    <button class="btn ghost" id="backupBtn">↧ Back up data</button>
    <span class="note">creates the current ISO week${STATE.current?` · ${STATE.current}`:""}</span>
  </div>
  <div class="actions rise" style="margin:0 0 14px;animation-delay:.05s">
    <input id="pubDir" class="cell" style="min-width:300px" placeholder="Publish folder — e.g. G:\\My Drive\\Magpie" value="${esc(pubDir)}">
    <button class="btn ghost" id="publishBtn">▴ Publish progress</button>
    <span class="note">writes a live magpie-progress.html for coworkers</span>
  </div>
  ${cards}`;
}

// ============================================================
//  VIEW 07 — TRENDS (week over week)
// ============================================================
const TREND_PALETTE = ["var(--lime)","var(--blue)","var(--ink)","var(--red)"];
function trendChart(series, color){
  const pts = series.points, n = pts.length;
  const vals = pts.filter(v=>v!=null);
  if(!vals.length) return `<div class="trend-empty">No soil data yet for this scope.</div>`;
  let lo=Math.min(...vals), hi=Math.max(...vals);
  if(lo===hi){ lo-=1; hi+=1; } else { const p=(hi-lo)*0.15; lo-=p; hi+=p; }
  const W=600,H=160,mx=10,top=14,bot=18;
  const X = i => n<=1 ? W/2 : mx + i*(W-2*mx)/(n-1);
  const Y = v => (H-bot) - ((v-lo)/(hi-lo))*((H-bot)-top);
  let line="", firstX=null, lastX=null, lastY=null;
  pts.forEach((v,i)=>{ if(v==null) return; const x=X(i), y=Y(v);
    if(firstX===null) firstX=x; lastX=x; lastY=y;
    line += (line?" L":"M") + x.toFixed(1) + " " + y.toFixed(1); });
  const area = firstX===null ? "" :
    `M${firstX.toFixed(1)} ${H-bot} L` + line.slice(1) + ` L${lastX.toFixed(1)} ${H-bot} Z`;
  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" role="img">
    <path d="${area}" fill="${color}" opacity="0.10"></path>
    <path d="${line}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"></path>
    <circle cx="${lastX.toFixed(1)}" cy="${lastY.toFixed(1)}" r="3.5" fill="${color}"></circle>
  </svg>`;
}
function deltaSpan(curr, prev){
  if(curr==null || prev==null) return "";
  const d = +(curr-prev).toFixed(1);
  if(d>0) return `<span class="d d-up">▲ ${d}</span>`;
  if(d<0) return `<span class="d d-dn">▼ ${Math.abs(d)}</span>`;
  return `<span class="d d-flat">– 0</span>`;
}
function lastTwo(points){
  let last=null, prev=null;
  for(const v of points){ if(v!=null){ prev=last; last=v; } }
  return [last, prev];
}
async function viewTrends(){
  const loc = STATE.trendLoc, cat = STATE.trendCat || "soil";
  const t = await API.get(`/api/trends?crop=${STATE.crop}&cat=${cat}${loc?`&loc=${encodeURIComponent(loc)}`:""}`);
  const series = t.series;

  const catOpts = t.categories.map(c=>`<option value="${c.key}" ${c.key===t.category?"selected":""}>${esc(c.label)}</option>`).join("");
  const scopeOpts = [`<option value="">Field average (all points)</option>`]
    .concat(t.locations.map(l=>`<option value="${esc(l)}" ${l===loc?"selected":""}>${esc(l)}</option>`)).join("");

  const cards = series.length ? series.map((s,i)=>{
    const [last,prev]=lastTwo(s.points);
    const lastTxt = last==null ? "—" : last;
    return `<div class="trend-card">
      <div class="th"><h3>${esc(s.label)}</h3>
        <span class="last">${lastTxt}<span class="u">${esc(s.unit)}</span>${deltaSpan(last,prev)}</span></div>
      ${trendChart(s, TREND_PALETTE[i%TREND_PALETTE.length])}</div>`;
  }).join("") : `<div class="trend-empty">No metrics in this category for ${cap(STATE.crop)}.</div>`;

  // delta table only when it stays readable (≤6 series); charts cover the rest.
  let table = "";
  if(t.weeks.length && series.length && series.length<=6){
    const head = series.map(s=>`<th>${esc(s.label)}${s.unit?` ${esc(s.unit)}`:""}</th>`).join("");
    const rows = t.weeks.map((wk,i)=>{
      const cells = series.map(s=>{
        const v=s.points[i];
        let prev=null; for(let j=i-1;j>=0;j--){ if(s.points[j]!=null){ prev=s.points[j]; break; } }
        return `<td>${v==null?'<span style="color:var(--ink-faint)">—</span>':v} ${deltaSpan(v,prev)}</td>`;
      }).join("");
      return `<tr><td>${esc(wk)}</td>${cells}</tr>`;
    }).reverse().join("");
    table = `<div class="section-title rise"><span class="idx">07·A</span><h2>By week</h2><span class="rule"></span></div>
      <div class="panel rise"><div class="pbody"><table class="data">
        <thead><tr><th>Week</th>${head}</tr></thead><tbody>${rows}</tbody></table></div></div>`;
  }

  const scopeLabel = loc ? `point <b>${esc(loc)}</b>` : `the <b>field average</b>`;
  return `
  <div class="vhead rise"><div class="step" style="background:var(--lime);color:#000">Analysis · Week over week</div><h1>Trends</h1>
    <p>How <b>${cap(STATE.crop)}</b> moves week to week — ${scopeLabel}. Pick a metric category; per-point values are that location's reading, the field view aggregates across all points each week (disease = total flags, the rest = average).</p></div>
  <div class="trend-controls rise" style="animation-delay:.05s">
    <label>Show</label><select id="trendCat">${catOpts}</select>
    <label>Scope</label><select id="trendScope">${scopeOpts}</select>
  </div>
  <div class="trend-grid rise" style="animation-delay:.08s">${cards}</div>
  ${table}`;
}

// ============================================================
//  VIEW 02 — WEEK OVERVIEW
// ============================================================
async function viewOverview(){
  const ov = STATE.overview = await API.get(`/api/overview?crop=${STATE.crop}&week=${encodeURIComponent(STATE.week)}`);
  let pest = null;
  try{ pest = await API.get(`/api/pest/status?crop=${STATE.crop}&week=${encodeURIComponent(STATE.week)}`); }catch(e){}
  const exp = ov.expected_fields, total = ov.total_locations;
  const totFilled = ov.locations.reduce((a,l)=>a+l.filled,0);
  const totPossible = exp*total || 1;
  const pct = Math.round(totFilled/totPossible*100);
  const covPct = Math.round(ov.locations_with_data/(total||1)*100);

  const cards = ov.locations.map((l,i)=>{
    const cls = statusClass(l.filled, exp);
    const fpct = Math.min(100, Math.round(l.filled/(exp||1)*100));
    return `<article class="pt rise" style="animation-delay:${.04*i}s" data-pt="${l.location_id}">
      <span class="status ${cls}"></span>
      <div class="id">${esc(l.location_id)}</div>
      <div class="stage">${esc(l.lat)}, ${esc(l.lon)}</div>
      <div class="coverbar"><i style="width:${fpct}%"></i></div>
      <div class="row"><span>Fields with data</span><span>${l.filled} / ${exp}</span></div>
    </article>`;
  }).join("");

  return `
  <div class="vhead rise">
    <div class="step">Step 02 · Pipeline start</div>
    <h1>Week overview</h1>
    <p>The working set for <b>${cap(STATE.crop)} · ${STATE.week}</b>. Each fixed monitoring point shows how many template fields carry a value — the same coverage the desktop Week-overview tab computes, straight from <b>obs_${STATE.crop}</b>.</p>
  </div>

  <div class="vitals rise" style="animation-delay:.06s">
    <div class="vital"><div class="label">Locations with data</div><div class="num">${ov.locations_with_data}<span class="u">/${total}</span></div><div class="sub">at least one field filled</div></div>
    <div class="vital"><div class="label">Fields filled</div><div class="num">${totFilled}<span class="u">/${totPossible}</span></div><div class="sub">across all points</div></div>
    <div class="vital"><div class="label">Coverage</div><div class="num">${pct}<span class="u">%</span></div><div class="sub">of expected field values</div></div>
    <div class="vital ${ov.locations_with_data<total?"alert":""}"><div class="label">Expected / point</div><div class="num">${exp}</div><div class="sub">template data fields</div></div>
  </div>

  <div class="cover rise" style="animation-delay:.12s">
    <div class="meter"><div class="mt"><span>Locations covered</span><b>${ov.locations_with_data}/${total}</b></div>
      <div class="track"><i class="survey" style="--r:${100-covPct}%"></i></div></div>
    <div class="meter"><div class="mt"><span>Field values filled</span><b>${pct}%</b></div>
      <div class="track"><i class="lab" style="--r:${100-pct}%"></i></div></div>
  </div>

  ${pestLine(pest)}

  <div class="section-title rise" style="animation-delay:.16s"><span class="idx">01·A</span><h2>Monitoring points</h2><span class="rule"></span></div>
  <div class="grid3">${cards}</div>`;
}
function pestLine(pest){
  if(!pest) return "";
  if(!pest.uploaded){
    return `<div class="meter rise" style="animation-delay:.14s;border:var(--bd) solid var(--line)">
      <div class="mt"><span>Pest ID</span><b style="color:var(--ink-faint)">not uploaded</b></div></div>`;
  }

function pickIdColumn(preview){
  // Prefer the source col auto-mapped to template "ID"; else common names.
  for(const [src,tgt] of Object.entries(preview.mapping.matches)) if(tgt==="ID") return src;
  for(const c of preview.source_cols) if(["id","location","location_id","site"].includes(c.trim().toLowerCase())) return c;
  return preview.source_cols[0]||"";
}

function labDisplayCols(p){
  const pri = ["sampleid","reportdate","reportno","labno","lab_no.","lab_no"];
  const priority = p.source_cols.filter(c=>pri.includes(c.trim().toLowerCase()));
  const mapped = p.source_cols.filter(c=>c in p.mapping.matches);
  const rest = mapped.filter(c=>!priority.includes(c)).slice(0,6);
  return priority.concat(rest);
}

async function ensureSchema(){

async function ensureOverview(){

async function loadObs(){
  const loc=STATE.activePt;
  const r = await API.get(`/api/obs?crop=${STATE.crop}&week=${encodeURIComponent(STATE.week)}&loc=${loc}`);

function ctrl(field){
  // Returns an input/select HTML carrying data-fname for save-time collection.
  const v = esc(STATE.obsValues[field.name]||"");
  const k = field.kind, nm = esc(field.name);
  if(k==="growth_stage"){
    const sch = STATE.schemaCache[STATE.crop];
    const opts = [`<option value=""></option>`].concat(sch.growth_stages.map(g=>{
      const label=`${g.code} - ${g.description}`;
      return `<option value="${esc(label)}" ${label===(STATE.obsValues[field.name]||"")?"selected":""}>${esc(label)}</option>`;
    }));
    return `<select class="ctrl" data-fname="${nm}">${opts.join("")}</select>`;
  }
  if(k==="disease_presence"||k==="severity"){
    const opts = field.choices.map(c=>`<option value="${esc(c)}" ${c===(STATE.obsValues[field.name]||"")?"selected":""}>${c===""?"—":esc(c)}</option>`).join("");
    return `<select class="ctrl" data-fname="${nm}">${opts}</select>`;
  }
  if(k==="rating"){
    const list = `dl_${nm.replace(/\W/g,"")}`;
    const opts = field.choices.filter(Boolean).map(c=>`<option value="${esc(c)}">`).join("");
    return `<input class="ctrl" data-fname="${nm}" list="${list}" value="${v}"><datalist id="${list}">${opts}</datalist>`;
  }
  const ph = k==="datetime" ? ` placeholder="YYYY-MM-DD HH:MM"` : (k==="number"?` inputmode="decimal"`:"");
  return `<input class="ctrl" data-fname="${nm}" value="${v}"${ph}>`;
}
function bareCtrl(field, cls){
  const v = esc(STATE.obsValues[field.name]||""); const nm=esc(field.name);
  if(field.kind==="severity"||field.kind==="disease_presence"){
    const opts = field.choices.map(c=>`<option value="${esc(c)}" ${c===(STATE.obsValues[field.name]||"")?"selected":""}>${c===""?"—":esc(c)}</option>`).join("");
    return `<select data-fname="${nm}">${opts}</select>`;
  }
  return `<input class="${cls||""}" data-fname="${nm}" value="${v}">`;
}

function sectionHtml(sec){
  if(sec.kind==="tdr_grid"){
    const row=(label,f)=>`<td>${f?bareCtrl(f):""}</td>`;
    const rows=sec.tdr_rows.map(t=>`<tr><td>${esc(t.sensor_label)}</td>${row("temp",t.temperature)}${row("ec",t.ec)}${row("moist",t.moisture)}</tr>`).join("");
    return `<div class="grp"><h4>${esc(sec.title)}</h4><table class="tdrtable">
      <thead><tr><th>Sensor</th><th>Temperature</th><th>EC</th><th>Moisture</th></tr></thead>
      <tbody>${rows}</tbody></table></div>`;
  }
  if(sec.kind==="disease_table"){
    const rows=sec.disease_rows.map(d=>`<div class="dz-row">
      <span>${esc(d.label)}</span>
      <span>${bareCtrl(d.presence)}</span>
      <span>${d.severity?bareCtrl(d.severity):""}</span></div>`).join("");
    return `<div class="grp"><h4>${esc(sec.title)} · presence &amp; severity</h4>
      <div class="dz-row" style="color:var(--ink-faint);font-size:10px;letter-spacing:.08em;text-transform:uppercase;border-bottom:1px solid var(--line)">
        <span>Disease</span><span>Present</span><span>Severity · L 1–10% / M 10–30% / H &gt;30%</span></div>
      ${rows}</div>`;
  }
  if(sec.kind==="nutrient_table"){
    const cells=sec.nutrient_rows.map(n=>{
      const key=esc(n.value.key);
      const unit=(n.value.name.match(/\(([^)]+)\)/)||[,""])[1];
      const rate=n.rate?`<input class="rate-in" data-fname="${esc(n.rate.name)}" value="${esc(STATE.obsValues[n.rate.name]||"")}" placeholder="rate">`:"";
      return `<div class="nutcell"><div class="el"><span>${key}<span class="u"> ${esc(unit)}</span></span>${rate}</div>
        <input data-fname="${esc(n.value.name)}" value="${esc(STATE.obsValues[n.value.name]||"")}" placeholder="value"></div>`;
    }).join("");
    return `<div class="grp"><h4>${esc(sec.title)} · level &amp; rate code (D / L / S / H / VH)</h4><div class="nutgrid">${cells}</div></div>`;
  }
  if(sec.kind==="ratio_table"){
    const rows=sec.ratio_rows.map(r=>`<div class="ratio"><div class="rn">${esc(r.name)}</div>
      <div class="rv"><input data-fname="${esc(r.actual.name)}" value="${esc(STATE.obsValues[r.actual.name]||"")}" placeholder="actual">
      <span>/</span>${r.expected?`<input data-fname="${esc(r.expected.name)}" value="${esc(STATE.obsValues[r.expected.name]||"")}" placeholder="exp">`:"<span>—</span>"}</div></div>`).join("");
    return `<div class="grp"><h4>${esc(sec.title)} · actual / expected</h4><div class="ratios">${rows}</div></div>`;
  }
  if(sec.kind==="images"){
    const thumbs=STATE.obsImages.map((n,i)=>{
      const url=`/api/images/file?crop=${STATE.crop}&week=${encodeURIComponent(STATE.week)}&loc=${STATE.activePt}&name=${encodeURIComponent(n)}`;
      return `<div class="photo"><img src="${url}" alt=""><span>${esc(n)}</span></div>`;
    }).join("");
    return `<div class="grp"><h4>${esc(sec.title)} · ${STATE.obsImages.length} attached</h4>
      <div class="photos">${thumbs}
        <div class="photo add" id="addPhoto"><span>+</span></div></div>
      <input type="file" id="photoFile" accept="image/*" hidden></div>`;
  }
  // form
  const fields=sec.fields.map(f=>`<div class="field"><label>${esc(f.name.replace(/_/g," "))}</label>${ctrl(f)}</div>`).join("");
  return `<div class="grp"><h4>${esc(sec.title)}</h4><div class="fgrid">${fields}</div></div>`;
}

function renderManifest(res){
  const tree=$("#tree");
  if(res.errors&&res.errors.length){
    tree.innerHTML = res.errors.map(e=>`<div class="empty">✗ ${esc(e.crop)}: ${esc(e.message)}</div>`).join("");
  }
  if(!res.produced.length){ if(!res.errors.length) tree.innerHTML=`<div class="empty">Nothing produced.</div>`; return; }
  const files=res.produced.filter(n=>!n.endsWith(".zip"));
  const zip=res.produced.find(n=>n.endsWith(".zip"));
  let html=`<div><span class="dir">▸ ${STATE.week}/</span></div>`;
  files.forEach((f,i)=>{ const last=i===files.length-1&&!zip;
    html+=`<div><span class="f">&nbsp;&nbsp;${last?"└─":"├─"} </span><span class="n">${esc(f)}</span></div>`; });
  if(zip) html+=`<div><span class="f">&nbsp;&nbsp;└─ </span><span class="n">${esc(zip)}</span></div>`;
  tree.innerHTML=html;
  if(zip){ const a=$("#dlZip"); a.style.display="inline-flex"; a.href=`/api/export/${encodeURIComponent(STATE.week)}/download`; }
}
async function runExport(btn, all){
  btn.disabled=true; const orig=btn.textContent; btn.textContent="Building…";
  const stages=[...$("#stages").querySelectorAll(".stage")];
  let tick=0; const anim=setInterval(()=>{ if(tick<stages.length){ if(tick>0){stages[tick-1].classList.replace("run","done");stages[tick-1].querySelector(".dot").textContent="✓";} stages[tick].classList.add("run"); tick++; } },500);
  try{
    const res = all ? await API.post(`/api/export-all?week=${encodeURIComponent(STATE.week)}`)
                    : await API.post(`/api/export?crop=${STATE.crop}&week=${encodeURIComponent(STATE.week)}`);
    clearInterval(anim);
    stages.forEach(s=>{s.classList.remove("run");s.classList.add(res.errors.length?"":"done");if(!res.errors.length)s.querySelector(".dot").textContent="✓";});
    renderManifest(res);
    if(res.errors.length) toast(`Export had ${res.errors.length} error(s) — see manifest`, true);
    else toast(`${res.zip_name||"package"} ready`);
  }catch(e){ clearInterval(anim); toast("Export failed: "+e.message, true); }
  btn.disabled=false; btn.textContent=orig;
}

//  ROUTER + EVENT WIRING
// ============================================================
async function render(){
  renderCtx(); renderNav();
  const v=$("#view"); v.innerHTML=`<div class="loading">Loading…</div>`;
  try{
    let html;
    if(STATE.view==="weeks") html=await viewWeeks();
    else if(STATE.view==="trends") html=await viewTrends();
    else if(STATE.view==="overview") html=await viewOverview();
    else if(STATE.view==="survey") html=await viewSurvey();
    else if(STATE.view==="lab") html=await viewLab();
    else if(STATE.view==="pest") html=await viewPest();
    else if(STATE.view==="obs") html=await viewObs();
    else html=viewExport();
    v.innerHTML=html;
    wire();
  }catch(e){ v.innerHTML=`<div class="loading">⚠ ${esc(e.message)}</div>`; }
}

function wireUpload(commitHandler){
  const drop=$("#drop"), file=$("#file");
  if(drop&&file){
    drop.onclick=()=>file.click();
    drop.ondragover=e=>{e.preventDefault();drop.classList.add("hot");};
    drop.ondragleave=()=>drop.classList.remove("hot");
    drop.ondrop=e=>{e.preventDefault();drop.classList.remove("hot");if(e.dataTransfer.files[0])doUpload(e.dataTransfer.files[0]);};
    file.onchange=()=>{ if(file.files[0]) doUpload(file.files[0]); };
  }
  async function doUpload(f){
    const fd=new FormData(); fd.append("crop",STATE.crop); fd.append("file",f);
    toast(`Uploading ${f.name}…`);
    try{
      const preview=await API.upload("/api/import/upload",fd);
      const slot=STATE.view==="survey"?"survey":"lab";
      STATE[slot]={token:preview.token,filename:preview.filename||f.name,preview,committed:false};
      render();
    }catch(e){ toast("Upload failed: "+e.message,true); }
  }
}

async function pestUpload(f){
  const fd=new FormData(); fd.append("file",f);
  toast(`Uploading ${f.name}…`);
  try{
    const p=await API.upload("/api/pest/upload",fd);
    const lastIdx = p.weeks.length ? p.weeks[p.weeks.length-1].index : 1;
    STATE.pest={token:p.token,filename:p.filename||f.name,crop:p.crop,crop_display:p.crop_display,
                weeks:p.weeks,weekIndex:lastIdx,committed:false};
    if(p.crop && p.crop!==STATE.crop){ toast(`Detected ${p.crop_display} — switch the crop selector to match before export`); }
    render();
  }catch(e){ toast("Upload failed: "+e.message,true); }
}

function startRename(card, wk){
  const head=card.querySelector(".wk-actions");
  head.innerHTML=`<input class="rn-in" value="${esc(wk)}"><button class="mini" data-act="save">Save</button><button class="mini" data-act="cancel">Cancel</button>`;
  const inp=head.querySelector(".rn-in"); inp.focus(); inp.select();
  head.querySelector('[data-act="cancel"]').onclick=()=>render();
  const doSave=async()=>{
    const nv=inp.value.trim();
    if(!nv||nv===wk){ render(); return; }
    try{
      const res=await API.post("/api/weeks/rename",{old:wk,new:nv});
      if(STATE.week===wk) STATE.week=res.tag;
      toast(`Renamed ${wk} → ${res.tag}`);
      await boot.loadWeeks(); STATE.overview=null; render();
    }catch(e){ toast("Rename failed: "+e.message,true); }
  };
  head.querySelector('[data-act="save"]').onclick=doSave;
  inp.onkeydown=e=>{ if(e.key==="Enter") doSave(); else if(e.key==="Escape") render(); };
}

function wire(){
  if(STATE.view==="weeks"){
    const nw=$("#newWeekDash"); if(nw) nw.onclick=async()=>{
      const {current}=await API.get("/api/weeks");
      if(STATE.weeks.includes(current)){ STATE.week=current; toast(`Week ${current} already exists — selected it`); }
      else { await API.post("/api/weeks",{tag:current}); toast(`Created week ${current}`); }
      await boot.loadWeeks(); STATE.week=current; STATE.overview=null; render();
    };
    const bk=$("#backupBtn"); if(bk) bk.onclick=async()=>{
      bk.disabled=true;
      try{ const r=await API.post("/api/backup"); toast(`Backup saved · ${r.name}`); }
      catch(e){ toast("Backup failed: "+e.message,true); }
      bk.disabled=false;
    };
    const pd=$("#pubDir"); if(pd) pd.onchange=async()=>{
      try{ await API.put("/api/publish/dir",{path:pd.value.trim()}); }catch(e){}
    };
    const pub=$("#publishBtn"); if(pub) pub.onclick=async()=>{
      pub.disabled=true;
      try{
        if(pd) await API.put("/api/publish/dir",{path:pd.value.trim()});
        const r=await API.post("/api/publish");
        toast(`Progress published → ${r.path}`);
      }catch(e){ toast("Publish failed: "+e.message,true); }
      pub.disabled=false;
    };
    $("#view").querySelectorAll(".wkcard").forEach(card=>{
      const wk=card.dataset.week;
      card.querySelectorAll(".mini").forEach(b=>b.onclick=async e=>{
        e.stopPropagation();
        const act=b.dataset.act;
        if(act==="open"){ STATE.week=wk; STATE.activePt=null; STATE.overview=null; STATE.view="overview"; render(); }
        else if(act==="rename"){ startRename(card, wk); }
        else if(act==="del"){
          if(!confirm(`Delete week ${wk}? Observation rows for every crop in this week are removed.`)) return;
          await API.del(`/api/weeks/${encodeURIComponent(wk)}`);
          toast(`Deleted week ${wk}`);
          await boot.loadWeeks(); if(STATE.week===wk) STATE.week=STATE.weeks[0]||null; STATE.overview=null; render();
        }
      });
    });
  }
  if(STATE.view==="trends"){
    const sc=$("#trendScope"); if(sc) sc.onchange=()=>{ STATE.trendLoc=sc.value; render(); };
    const ct=$("#trendCat"); if(ct) ct.onchange=()=>{ STATE.trendCat=ct.value; render(); };
  }
  if(STATE.view==="overview"){
    $("#view").querySelectorAll(".pt").forEach(c=>c.onclick=()=>{STATE.activePt=c.dataset.pt;STATE.view="obs";render();});
  }
  if(STATE.view==="survey"){
    wireUpload();
    const idsel=$("#idCol"); if(idsel) idsel.onchange=()=>{STATE.survey.idCol=idsel.value;};
    const c=$("#commit"); if(c) c.onclick=async()=>{
      c.disabled=true;
      try{
        const res=await API.post("/api/import/survey",{token:STATE.survey.token,crop:STATE.crop,week:STATE.week,id_col:STATE.survey.idCol||pickIdColumn(STATE.survey.preview)});
        STATE.survey.committed=true; STATE.overview=null;
        toast(`Imported ${res.imported} · skipped ${res.skipped_no_loc} no-match, ${res.skipped_empty} empty${res.photos_copied?` · ${res.photos_copied} photos`:""}`);
      }catch(e){ toast("Import failed: "+e.message,true); }
      c.disabled=false;
    };
  }
  if(STATE.view==="lab"){
    wireUpload();
    $("#view").querySelectorAll("select[data-row]").forEach(sel=>sel.onchange=()=>{
      const i=sel.dataset.row; if(sel.value) STATE.lab.targets[i]=sel.value; else delete STATE.lab.targets[i];
      const n=Object.values(STATE.lab.targets).filter(Boolean).length;
      const b=$("#assignBadge"); if(b) b.textContent=`${n} assigned`;
      const cb=$("#commit"); if(cb) cb.textContent=`Commit ${n} rows → obs_${STATE.crop}`;
    });
    const c=$("#commit"); if(c) c.onclick=async()=>{
      c.disabled=true;
      try{
        const res=await API.post("/api/import/lab",{token:STATE.lab.token,crop:STATE.crop,week:STATE.week,row_targets:STATE.lab.targets});
        STATE.lab.committed=true; STATE.overview=null;
        toast(`Imported ${res.imported} · skipped ${res.skipped_no_target} unassigned, ${res.skipped_empty} empty`);
      }catch(e){ toast(e.message,true); }
      c.disabled=false;
    };
  }
  if(STATE.view==="pest"){
    const drop=$("#pestdrop"), file=$("#pestfile");
    if(drop&&file){
      drop.onclick=()=>file.click();
      drop.ondragover=e=>{e.preventDefault();drop.classList.add("hot");};
      drop.ondragleave=()=>drop.classList.remove("hot");
      drop.ondrop=e=>{e.preventDefault();drop.classList.remove("hot");if(e.dataTransfer.files[0])pestUpload(e.dataTransfer.files[0]);};
      file.onchange=()=>{ if(file.files[0]) pestUpload(file.files[0]); };
    }
    const ws=$("#pestWeek"); if(ws) ws.onchange=()=>{ STATE.pest.weekIndex=+ws.value; render(); };
    const c=$("#pestCommit"); if(c) c.onclick=async()=>{
      c.disabled=true;
      try{
        const res=await API.post("/api/pest/commit",{token:STATE.pest.token,week:STATE.week,week_index:STATE.pest.weekIndex});
        STATE.pest.committed=true;
        toast(`Pest week ${res.week_label} → ${STATE.week} · ${res.cards_completed} cards${res.bug_types.length?`, ${res.bug_types.length} bug type(s)`:", no bugs"}`);
        render();
      }catch(e){ toast("Pest import failed: "+e.message,true); }
      c.disabled=false;
    };
  }
  if(STATE.view==="obs"){
    $("#view").querySelectorAll(".ptrail button").forEach(b=>b.onclick=()=>{STATE.activePt=b.dataset.pt;render();});
    $("#view").querySelectorAll(".subtabs button").forEach(b=>b.onclick=()=>{STATE.obsTab=b.dataset.tab;render();});
    const sv=$("#obsSave"); if(sv) sv.onclick=()=>saveObs().catch(e=>toast("Save failed: "+e.message,true));
    const rl=$("#obsReload"); if(rl) rl.onclick=()=>render();
    const add=$("#addPhoto"), pf=$("#photoFile");
    if(add&&pf){ add.onclick=()=>pf.click(); pf.onchange=async()=>{
      if(!pf.files[0]) return;
      const fd=new FormData(); fd.append("crop",STATE.crop);fd.append("week",STATE.week);fd.append("loc",STATE.activePt);fd.append("file",pf.files[0]);
      try{ await API.upload("/api/images",fd); toast("Photo attached"); render(); }
      catch(e){ toast("Attach failed: "+e.message,true); }
    };}
  }
  if(STATE.view==="export"){
    const r=$("#runExport"); if(r) r.onclick=()=>runExport(r,false);
    const ra=$("#runExportAll"); if(ra) ra.onclick=()=>runExport(ra,true);
  }
}

// ---------- boot ----------
const boot = {
  async loadWeeks(){ const w=await API.get("/api/weeks"); STATE.weeks=w.weeks.map(r=>r.iso_week); STATE.current=w.current; },
  refreshAndRender(){ STATE.overview=null; render(); },
  async init(){
    STATE.crops=await API.get("/api/crops");
    STATE.crop=STATE.crops[0]?.code||null;
    await this.loadWeeks();
    STATE.week=STATE.weeks.includes(STATE.current)?STATE.current:(STATE.weeks[0]||null);
    render();
  },
};
boot.init().catch(e=>{ $("#view").innerHTML=`<div class="loading">⚠ Could not reach the Magpie API: ${esc(e.message)}</div>`; });
</script>
