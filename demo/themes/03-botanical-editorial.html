<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magpie · Botanical Editorial</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300..700;1,6..72,300..600&family=Hanken+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#FBF7EF; --cream-2:#F3ECDD; --paper:#FFFFFF;
    --ink:#14271C; --ink-soft:#46584C; --ink-faint:#8A988C;
    --line:#DED5C2; --line-2:#E8E0D0;
    --coral:#E2553B; --sage:#7C9A6E; --olive:#5B7245; --gold:#C79A3C;
    --rail:268px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--cream);color:var(--ink);font-family:"Hanken Grotesk",system-ui,sans-serif;line-height:1.55;-webkit-font-smoothing:antialiased;overflow-x:hidden}
  ::selection{background:var(--coral);color:var(--cream)}
  .app{display:grid;grid-template-columns:var(--rail) 1fr;min-height:100vh}
  .rail{position:sticky;top:0;height:100vh;border-right:1px solid var(--line);background:var(--cream);display:flex;flex-direction:column;padding:34px 0;overflow-y:auto}
  .brand{padding:0 30px 28px}
  .wordmark{font-family:"Newsreader",serif;font-weight:400;font-size:50px;line-height:.85;letter-spacing:-.02em;color:var(--ink)}
  .wordmark .bird{font-style:italic;color:var(--coral)}
  .tag{font-family:"IBM Plex Mono",monospace;font-size:10px;letter-spacing:.24em;text-transform:uppercase;color:var(--ink-faint);margin-top:14px}
  nav{padding:14px 18px;flex:1}
  .nav-item{display:flex;align-items:baseline;gap:14px;padding:14px 14px;cursor:pointer;color:var(--ink-soft);transition:.2s;border-bottom:1px solid var(--line)}
  .nav-item:first-child{border-top:1px solid var(--line)}
  .nav-item:hover{color:var(--ink);padding-left:20px}
  .nav-item.active{color:var(--ink)}
  .ni{font-family:"IBM Plex Mono",monospace;font-size:11px;color:var(--coral);width:18px}
  .nl{font-family:"Newsreader",serif;font-size:19px;flex:1}
  .nav-item.active .nl{font-style:italic}
  .foot{padding:22px 30px 4px;font-family:"IBM Plex Mono",monospace;font-size:11px;color:var(--ink-faint);line-height:2}
  .foot b{color:var(--ink-soft);font-weight:500}
  .main{display:flex;flex-direction:column;min-width:0}
  .ctxbar{position:sticky;top:0;z-index:50;background:var(--cream);border-bottom:1px solid var(--line);padding:18px 56px;display:flex;align-items:center;gap:28px;flex-wrap:wrap}
  .live{font-family:"IBM Plex Mono",monospace;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-soft);display:flex;align-items:center;gap:9px}
  .live .dot{width:7px;height:7px;border-radius:50%;background:var(--sage)}
  .spacer{flex:1}
  .seg{display:flex;gap:6px}
  .seg button{font-family:"IBM Plex Mono",monospace;font-size:11.5px;letter-spacing:.06em;text-transform:uppercase;padding:8px 18px;background:transparent;color:var(--ink-soft);border:1px solid var(--line);border-radius:999px;cursor:pointer}
  .seg button.on{background:var(--ink);color:var(--cream);border-color:var(--ink)}
  .ctxfield{font-family:"IBM Plex Mono",monospace;font-size:12px;color:var(--ink-soft)}
  .ctxfield b{color:var(--ink);font-weight:600}
  .view{padding:54px 56px 90px;max-width:1180px}
  .vhead{margin-bottom:18px;border-bottom:2px solid var(--ink);padding-bottom:26px}
  .step{font-family:"IBM Plex Mono",monospace;font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--coral);margin-bottom:16px}
  .vhead h1{font-family:"Newsreader",serif;font-weight:300;font-size:clamp(48px,8vw,92px);line-height:.92;letter-spacing:-.03em}
  .vhead h1 em{font-style:italic;color:var(--olive)}
  .vhead p{margin-top:20px;max-width:56ch;color:var(--ink-soft);font-size:17px;font-family:"Newsreader",serif;font-weight:300}
  .vhead b{font-weight:500;color:var(--ink)}
  .section-title{display:flex;align-items:baseline;gap:16px;margin:54px 0 24px}
  .section-title h2{font-family:"Newsreader",serif;font-style:italic;font-weight:400;font-size:30px}
  .section-title .idx{font-family:"IBM Plex Mono",monospace;font-size:11px;color:var(--coral)}
  .section-title .rule{flex:1;height:1px;background:var(--ink);opacity:.25}
  .vitals{display:grid;grid-template-columns:repeat(4,1fr);gap:0;border-top:1px solid var(--line)}
  .vital{padding:26px 26px 26px 0;border-right:1px solid var(--line)}
  .vital:last-child{border-right:none;padding-right:0}
  .vital:first-child{padding-left:0}
  .vital{padding-left:26px}
  .vital:first-child{padding-left:0}
  .vital .label{font-family:"IBM Plex Mono",monospace;font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:var(--ink-faint)}
  .vital .num{font-family:"Newsreader",serif;font-weight:300;font-size:clamp(40px,5.5vw,64px);line-height:1;margin-top:14px;letter-spacing:-.02em}
  .vital.alert .num{color:var(--coral)}
  .vital .num .u{font-size:.32em;font-family:"IBM Plex Mono",monospace;color:var(--ink-faint);margin-left:6px}
  .vital .sub{font-size:13px;color:var(--ink-soft);margin-top:10px}
  .cover{display:grid;grid-template-columns:1fr 1fr;gap:40px;margin-top:34px}
  .meter .mt{display:flex;justify-content:space-between;align-items:baseline;font-family:"IBM Plex Mono",monospace;font-size:11.5px;text-transform:uppercase;letter-spacing:.07em;color:var(--ink-soft);margin-bottom:10px}
  .meter .mt b{font-family:"Newsreader",serif;font-size:22px;font-style:italic;color:var(--ink)}
  .track{height:3px;background:var(--line);overflow:hidden}
  .track i{display:block;height:100%;background:var(--olive);width:var(--w)}
  .track i.lab{background:var(--gold)}
  .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:0;border-top:1px solid var(--line);border-left:1px solid var(--line)}
  .pt{position:relative;border-right:1px solid var(--line);border-bottom:1px solid var(--line);padding:24px;transition:.25s;cursor:pointer;background:var(--cream)}
  .pt:hover{background:var(--paper)}
  .status{position:absolute;top:24px;right:24px;width:8px;height:8px;border-radius:50%;background:var(--sage)}
  .status.flag{background:var(--coral)} .status.watch{background:var(--gold)}
  .pt .id{font-family:"Newsreader",serif;font-size:42px;font-weight:300;line-height:1;letter-spacing:-.02em}
  .pt .stg{font-size:13px;color:var(--ink-soft);margin-top:6px;font-style:italic;font-family:"Newsreader",serif;font-size:15px}
  .srcs{display:flex;gap:7px;margin:16px 0 14px;flex-wrap:wrap}
  .src{font-family:"IBM Plex Mono",monospace;font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;padding:3px 0;color:var(--ink-faint);border-bottom:1px solid var(--line)}
  .src.on{color:var(--olive);border-color:var(--olive)}
  .src.lab.on{color:var(--gold);border-color:var(--gold)}
  .src:not(:last-child){margin-right:4px}
  .row{display:flex;justify-content:space-between;font-size:14px;padding:7px 0;border-top:1px dotted var(--line);color:var(--ink-soft)}
  .row span:last-child{color:var(--ink);font-family:"IBM Plex Mono",monospace;font-size:13px}
  .flagtxt{display:inline-block;margin-top:12px;font-family:"IBM Plex Mono",monospace;font-size:10.5px;color:var(--coral);letter-spacing:.04em}
</style>
</head>
<body>
<div class="app">
  <aside class="rail">
    <div class="brand"><div class="wordmark">Mag<span class="bird">pie</span></div><div class="tag">Weekly package builder</div></div>
    <nav id="nav"></nav>
    <div class="foot">crop <b>Canola</b><br>week <b>2026-W22</b><br>db <b>packages.sqlite</b></div>
  </aside>
  <main class="main">
    <div class="ctxbar">
      <div class="live"><span class="dot"></span>Local · 127.0.0.1</div>
      <div class="spacer"></div>
      <div class="seg"><button class="on">Canola</button><button>Corn</button></div>
      <div class="ctxfield">week <b>2026-W22</b></div>
    </div>
    <div class="view" id="view"></div>
  </main>
</div>
<script src="theme-data.js"></script>
<script>
  document.getElementById("nav").innerHTML = NAV.map((it,i)=>`<div class="nav-item ${i===0?'active':''}"><span class="ni">${it.n}</span><span class="nl">${it.l}</span></div>`).join("");
  const cards = PTS.map(p=>`<article class="pt">
    <span class="status ${p.status}"></span>
    <div class="id">${p.id}</div><div class="stg">${p.stage}</div>
    <div class="srcs"><span class="src on">Survey</span><span class="src lab ${p.lab?'on':''}">Lab</span>${p.img?`<span class="src">▣ ${p.img}</span>`:''}</div>
    <div class="row"><span>Soil temp</span><span>${p.temp} °C</span></div>
    <div class="row"><span>Moisture</span><span>${p.moist} %</span></div>
    ${p.flag?`<span class="flagtxt">↳ ${p.flag}</span>`:''}
  </article>`).join("");
  document.getElementById("view").innerHTML = `
    <div class="vhead"><div class="step">Step 01 · Pipeline start</div><h1>Week <em>overview</em></h1>
      <p>The working set for <b>Canola · 2026-W22</b>. Each of the nine fixed monitoring points shows which upstream feeds have landed and the headline field reading.</p></div>
    <div class="vitals">
      <div class="vital"><div class="label">Mean soil temp</div><div class="num">17.9<span class="u">°C</span></div><div class="sub">TDR avg across committed points</div></div>
      <div class="vital"><div class="label">Mean soil EC</div><div class="num">0.40<span class="u">dS/m</span></div><div class="sub">Within expected band</div></div>
      <div class="vital"><div class="label">Growth stage</div><div class="num" style="font-size:44px">BBCH 65</div><div class="sub">Modal · full flowering</div></div>
      <div class="vital alert"><div class="label">Disease flags</div><div class="num">3<span class="u">/9</span></div><div class="sub">Blackleg · Sclerotinia · Aster</div></div>
    </div>
    <div class="cover">
      <div class="meter"><div class="mt"><span>Field coverage · Survey123</span><b>9/9</b></div><div class="track"><i style="--w:100%"></i></div></div>
      <div class="meter"><div class="mt"><span>Lab coverage · PT2R</span><b>7/9</b></div><div class="track"><i class="lab" style="--w:78%"></i></div></div>
    </div>
    <div class="section-title"><span class="idx">01·A</span><h2>Monitoring points</h2><span class="rule"></span></div>
    <div class="grid3">${cards}</div>`;
</script>
</body>
</html>
