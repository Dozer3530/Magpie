<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magpie · Nocturne</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0C100E; --bg-2:#121814; --panel:#161D18; --panel-2:#1B231D;
    --grid:rgba(158,240,26,.05);
    --ink:#E6EDE4; --ink-soft:#9DB09E; --ink-faint:#65766A;
    --line:#26312A; --line-2:#334134;
    --phos:#9EF01A; --amber:#FFB347; --cyan:#38E0C9; --red:#FF5A4D;
    --rail:280px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:"Archivo",system-ui,sans-serif;line-height:1.5;-webkit-font-smoothing:antialiased;overflow-x:hidden;
    background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);background-size:32px 32px}
  ::selection{background:var(--phos);color:var(--bg)}
  .app{display:grid;grid-template-columns:var(--rail) 1fr;min-height:100vh}
  .rail{position:sticky;top:0;height:100vh;border-right:1px solid var(--line);background:linear-gradient(180deg,#0A0E0C,#0E1310);display:flex;flex-direction:column;padding:28px 0;overflow-y:auto}
  .brand{padding:0 26px 24px;border-bottom:1px solid var(--line)}
  .wordmark{font-family:"Archivo",sans-serif;font-weight:800;font-size:40px;line-height:.9;letter-spacing:-.04em}
  .wordmark .bird{color:var(--phos);text-shadow:0 0 16px rgba(158,240,26,.55)}
  .tag{font-family:"IBM Plex Mono",monospace;font-size:10px;letter-spacing:.26em;text-transform:uppercase;color:var(--ink-faint);margin-top:11px}
  nav{padding:22px 16px;flex:1}
  .nav-item{display:flex;align-items:center;gap:13px;padding:12px 14px;cursor:pointer;color:var(--ink-soft);transition:.2s;position:relative;margin-bottom:2px;border:1px solid transparent}
  .nav-item:hover{background:var(--panel);color:var(--ink)}
  .nav-item.active{background:var(--panel-2);color:var(--ink);border-color:var(--line-2)}
  .nav-item.active::before{content:"";position:absolute;left:-1px;top:6px;bottom:6px;width:2px;background:var(--phos);box-shadow:0 0 10px var(--phos)}
  .ni{font-family:"IBM Plex Mono",monospace;font-size:11px;color:var(--phos);width:20px}
  .nl{font-weight:500;font-size:14px;flex:1}
  .foot{padding:18px 26px 4px;border-top:1px solid var(--line);font-family:"IBM Plex Mono",monospace;font-size:11px;color:var(--ink-faint);line-height:1.95}
  .foot b{color:var(--ink-soft)}
  .main{display:flex;flex-direction:column;min-width:0}
  .ctxbar{position:sticky;top:0;z-index:50;background:rgba(12,16,14,.86);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);padding:16px 40px;display:flex;align-items:center;gap:26px;flex-wrap:wrap}
  .live{font-family:"IBM Plex Mono",monospace;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-soft);display:flex;align-items:center;gap:9px}
  .live .dot{width:8px;height:8px;border-radius:50%;background:var(--phos);box-shadow:0 0 10px var(--phos);animation:pulse 2s ease-in-out infinite}
  @keyframes pulse{50%{opacity:.4}}
  .spacer{flex:1}
  .seg{display:flex;border:1px solid var(--line-2);border-radius:6px;overflow:hidden}
  .seg button{font-family:"IBM Plex Mono",monospace;font-size:12px;letter-spacing:.06em;text-transform:uppercase;padding:8px 16px;background:var(--panel);color:var(--ink-soft);border:none;cursor:pointer;border-right:1px solid var(--line)}
  .seg button:last-child{border-right:none}
  .seg button.on{background:var(--phos);color:var(--bg);font-weight:600}
  .ctxfield{font-family:"IBM Plex Mono",monospace;font-size:12px;color:var(--ink-soft)}
  .ctxfield b{color:var(--phos)}
  .view{padding:40px 40px 80px;max-width:1240px}
  .vhead{margin-bottom:32px}
  .step{font-family:"IBM Plex Mono",monospace;font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:var(--cyan);margin-bottom:10px}
  .vhead h1{font-family:"Archivo",sans-serif;font-weight:800;font-size:clamp(34px,5vw,56px);line-height:.98;letter-spacing:-.035em}
  .vhead p{margin-top:14px;max-width:62ch;color:var(--ink-soft);font-size:15px}
  .vhead b{color:var(--ink)}
  .section-title{display:flex;align-items:center;gap:14px;margin:42px 0 22px}
  .section-title h2{font-family:"Archivo",sans-serif;font-weight:700;font-size:20px;letter-spacing:-.01em}
  .section-title .idx{font-family:"IBM Plex Mono",monospace;font-size:11px;color:var(--cyan)}
  .section-title .rule{flex:1;height:1px;background:var(--line)}
  .vitals{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  .vital{padding:20px;border:1px solid var(--line);background:var(--panel);border-radius:10px;position:relative;overflow:hidden}
  .vital::after{content:"";position:absolute;inset:0 0 auto 0;height:2px;background:var(--phos);opacity:.5}
  .vital.alert::after{background:var(--red)}
  .vital .label{font-family:"IBM Plex Mono",monospace;font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:var(--ink-faint)}
  .vital .num{font-family:"IBM Plex Mono",monospace;font-size:clamp(28px,4vw,42px);font-weight:600;line-height:1.05;margin-top:12px;color:var(--phos);text-shadow:0 0 14px rgba(158,240,26,.3)}
  .vital.alert .num{color:var(--red);text-shadow:0 0 14px rgba(255,90,77,.3)}
  .vital .num .u{font-size:.4em;color:var(--ink-faint);margin-left:5px;text-shadow:none}
  .vital .sub{font-size:12px;color:var(--ink-soft);margin-top:9px}
  .cover{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:20px}
  .meter .mt{display:flex;justify-content:space-between;font-family:"IBM Plex Mono",monospace;font-size:11.5px;text-transform:uppercase;letter-spacing:.07em;color:var(--ink-soft);margin-bottom:8px}
  .meter .mt b{color:var(--ink)}
  .track{height:10px;border:1px solid var(--line-2);border-radius:6px;background:var(--bg-2);overflow:hidden}
  .track i{display:block;height:100%;background:var(--phos);width:var(--w);box-shadow:0 0 12px var(--phos)}
  .track i.lab{background:var(--amber);box-shadow:0 0 12px var(--amber)}
  .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
  .pt{position:relative;border:1px solid var(--line);background:var(--panel);padding:18px;border-radius:10px;transition:.2s;cursor:pointer}
  .pt:hover{border-color:var(--line-2);background:var(--panel-2);transform:translateY(-2px)}
  .status{position:absolute;top:16px;right:16px;width:9px;height:9px;border-radius:50%;background:var(--phos);box-shadow:0 0 8px var(--phos)}
  .status.flag{background:var(--red);box-shadow:0 0 8px var(--red)} .status.watch{background:var(--amber);box-shadow:0 0 8px var(--amber)}
  .pt .id{font-family:"IBM Plex Mono",monospace;font-size:26px;font-weight:600;color:var(--ink)}
  .pt .stg{font-size:12.5px;color:var(--ink-soft);margin-top:3px}
  .srcs{display:flex;gap:6px;margin:13px 0 11px;flex-wrap:wrap}
  .src{font-family:"IBM Plex Mono",monospace;font-size:10px;letter-spacing:.05em;text-transform:uppercase;padding:3px 8px;border:1px solid var(--line-2);color:var(--ink-faint);border-radius:4px}
  .src.on{background:rgba(158,240,26,.12);color:var(--phos);border-color:rgba(158,240,26,.4)}
  .src.lab.on{background:rgba(255,179,71,.12);color:var(--amber);border-color:rgba(255,179,71,.4)}
  .row{display:flex;justify-content:space-between;font-size:13px;padding:5px 0;border-top:1px solid var(--line);color:var(--ink-soft)}
  .row span:last-child{font-family:"IBM Plex Mono",monospace;color:var(--ink)}
  .flagtxt{display:inline-block;margin-top:10px;font-family:"IBM Plex Mono",monospace;font-size:10.5px;padding:4px 9px;background:rgba(255,90,77,.12);color:var(--red);border:1px solid rgba(255,90,77,.3);border-radius:4px}
</style>
</head>
<body>
<div class="app">
  <aside class="rail">
    <div class="brand"><div class="wordmark">Mag<span class="bird">pie</span></div><div class="tag">Weekly package builder</div></div>
    <nav id="nav"></nav>
    <div class="foot">crop <b>Canola</b><br>week <b>2026-W22</b><br>db <b>packages.sqlite</b></div>
  </aside>
  <main class="main">
    <div class="ctxbar">
      <div class="live"><span class="dot"></span>Local · 127.0.0.1</div>
      <div class="spacer"></div>
      <div class="seg"><button class="on">Canola</button><button>Corn</button></div>
      <div class="ctxfield">week <b>2026-W22</b></div>
    </div>
    <div class="view" id="view"></div>
  </main>
</div>
<script src="theme-data.js"></script>
<script>
  document.getElementById("nav").innerHTML = NAV.map((it,i)=>`<div class="nav-item ${i===0?'active':''}"><span class="ni">${it.n}</span><span class="nl">${it.l}</span></div>`).join("");
  const cards = PTS.map(p=>`<article class="pt">
    <span class="status ${p.status}"></span>
    <div class="id">${p.id}</div><div class="stg">${p.stage}</div>
    <div class="srcs"><span class="src on">Survey</span><span class="src lab ${p.lab?'on':''}">Lab</span>${p.img?`<span class="src">▣ ${p.img}</span>`:''}</div>
    <div class="row"><span>Soil temp</span><span>${p.temp} °C</span></div>
    <div class="row"><span>Moisture</span><span>${p.moist} %</span></div>
    ${p.flag?`<span class="flagtxt">${p.flag}</span>`:''}
  </article>`).join("");
  document.getElementById("view").innerHTML = `
    <div class="vhead"><div class="step">Step 01 · Pipeline start</div><h1>Week overview</h1>
      <p>The working set for <b>Canola · 2026-W22</b>. Each of the nine fixed monitoring points shows which upstream feeds have landed and the headline field reading.</p></div>
    <div class="vitals">
      <div class="vital"><div class="label">Mean soil temp</div><div class="num">17.9<span class="u">°C</span></div><div class="sub">TDR avg across committed points</div></div>
      <div class="vital"><div class="label">Mean soil EC</div><div class="num">0.40<span class="u">dS/m</span></div><div class="sub">Within expected band</div></div>
      <div class="vital"><div class="label">Growth stage</div><div class="num" style="font-size:30px">BBCH 65</div><div class="sub">Modal · full flowering</div></div>
      <div class="vital alert"><div class="label">Disease flags</div><div class="num">3<span class="u">/9</span></div><div class="sub">Blackleg · Sclerotinia · Aster</div></div>
    </div>
    <div class="cover">
      <div class="meter"><div class="mt"><span>Field coverage · Survey123</span><b>9/9</b></div><div class="track"><i style="--w:100%"></i></div></div>
      <div class="meter"><div class="mt"><span>Lab coverage · PT2R</span><b>7/9</b></div><div class="track"><i class="lab" style="--w:78%"></i></div></div>
    </div>
    <div class="section-title"><span class="idx">01·A</span><h2>Monitoring points</h2><span class="rule"></span></div>
    <div class="grid3">${cards}</div>`;
</script>
</body>
</html>
